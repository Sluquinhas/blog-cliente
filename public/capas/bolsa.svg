<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Bolsa de valores">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgB)"/>
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
  </g>
  <!-- candlesticks: verde = alta, vermelho = baixa -->
  <g stroke-width="6">
    <g stroke="#34d399" fill="#34d399">
      <line x1="190" y1="300" x2="190" y2="470"/><rect x="170" y="350" width="40" height="90" rx="3"/>
      <line x1="430" y1="220" x2="430" y2="400"/><rect x="410" y="260" width="40" height="110" rx="3"/>
      <line x1="790" y1="180" x2="790" y2="360"/><rect x="770" y="210" width="40" height="120" rx="3"/>
      <line x1="1030" y1="120" x2="1030" y2="300"/><rect x="1010" y="150" width="40" height="120" rx="3"/>
    </g>
    <g stroke="#f87171" fill="#f87171">
      <line x1="310" y1="280" x2="310" y2="460"/><rect x="290" y="320" width="40" height="100" rx="3"/>
      <line x1="550" y1="250" x2="550" y2="430"/><rect x="530" y="300" width="40" height="90" rx="3"/>
      <line x1="670" y1="230" x2="670" y2="410"/><rect x="650" y="280" width="40" height="80" rx="3"/>
      <line x1="910" y1="200" x2="910" y2="380"/><rect x="890" y="250" width="40" height="80" rx="3"/>
    </g>
  </g>
  <text x="100" y="575" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#cbd5e1" letter-spacing="6">RENDA VARIÁVEL</text>
</svg>
