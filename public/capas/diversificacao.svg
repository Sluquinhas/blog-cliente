<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Diversificação de carteira">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#221c3b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bgD)"/>
  <!-- donut chart -->
  <g transform="translate(420 315)" fill="none" stroke-width="90">
    <circle r="150" stroke="#1f2937"/>
    <circle r="150" stroke="#3b82f6" stroke-dasharray="300 642" transform="rotate(-90)"/>
    <circle r="150" stroke="#34d399" stroke-dasharray="220 642" stroke-dashoffset="-300" transform="rotate(-90)"/>
    <circle r="150" stroke="#f59e0b" stroke-dasharray="130 642" stroke-dashoffset="-520" transform="rotate(-90)"/>
    <circle r="150" stroke="#a78bfa" stroke-dasharray="92 642" stroke-dashoffset="-650" transform="rotate(-90)"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    <g transform="translate(760 200)">
      <rect width="34" height="34" rx="6" fill="#3b82f6"/><text x="50" y="28" fill="#e2e8f0">Renda fixa</text>
    </g>
    <g transform="translate(760 270)">
      <rect width="34" height="34" rx="6" fill="#34d399"/><text x="50" y="28" fill="#e2e8f0">Ações</text>
    </g>
    <g transform="translate(760 340)">
      <rect width="34" height="34" rx="6" fill="#f59e0b"/><text x="50" y="28" fill="#e2e8f0">Fundos</text>
    </g>
    <g transform="translate(760 410)">
      <rect width="34" height="34" rx="6" fill="#a78bfa"/><text x="50" y="28" fill="#e2e8f0">Exterior</text>
    </g>
  </g>
</svg>
